<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Essa 2.0 Ultra Mem Fullscreen</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Boogaloo&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: #121212;
    font-family: 'Boogaloo', 'Segoe UI', Arial, sans-serif;
    display: flex; justify-content: center; align-items: center;
    position: relative;
    transition: background-color 0.3s;
  }

  #container {
    text-align: center;
    z-index: 10;
    position: absolute;
    width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    gap: 16px;
  }

  #drawBtn {
    padding: 20px 40px;
    background-color: #ff4081;
    border: none;
    border-radius: 30px;
    color: #121212;
    cursor: pointer;
    font-size: 20px;
    font-family: 'Boogaloo', sans-serif;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(255,64,129,0.4);
    transition: all 0.2s ease;
    z-index: 20;
    letter-spacing: 1px;
  }
  #drawBtn:hover { transform: scale(1.1); }
  #drawBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  #resetBtn {
    padding: 12px 28px;
    background-color: #333;
    border: 2px solid #ff4081;
    border-radius: 30px;
    color: #ff4081;
    cursor: pointer;
    font-size: 15px;
    font-family: 'Boogaloo', sans-serif;
    font-weight: bold;
    transition: all 0.2s ease;
    display: none;
    z-index: 20;
  }
  #resetBtn:hover { background-color: #ff4081; color: #121212; }

  #counter {
    color: #aaa;
    font-size: 16px;
    letter-spacing: 2px;
    z-index: 20;
  }

  #result {
    font-weight: bold;
    text-transform: uppercase;
    text-align: center;
    color: #fff;
    padding: 20px;
    line-height: 1;
    z-index: 5;
    position: relative;
    font-family: 'Black Han Sans', sans-serif;
  }

  /* ===== OVERLAYS ===== */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
  }

  /* 67 – SIX SEVEN */
  #overlay.sixseven {
    display: block;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,0,0,0.15) 0px, rgba(255,0,0,0.15) 10px,
      rgba(0,0,255,0.15) 10px, rgba(0,0,255,0.15) 20px
    );
    animation: sixsevenFlash 0.5s steps(1) 4 forwards;
  }
  @keyframes sixsevenFlash {
    0%,100% { opacity:1 }
    50% { opacity:0.3 }
  }

  /* 69 */
  #overlay.sixty9 {
    display: block;
    background: radial-gradient(circle, rgba(255,105,180,0.25) 0%, transparent 70%);
    animation: pulsePink 0.4s ease-in-out 6 alternate forwards;
  }
  @keyframes pulsePink {
    from { opacity: 0.3; }
    to   { opacity: 1; }
  }

  /* 420 */
  #overlay.blaze {
    display: block;
    background: radial-gradient(ellipse at center, rgba(0,200,80,0.20) 0%, transparent 70%);
    animation: smokeIn 3s ease forwards;
  }
  @keyframes smokeIn {
    0% { opacity:0; transform: scale(0.9); }
    30% { opacity:1; transform: scale(1.05); }
    100% { opacity:0.6; transform: scale(1); }
  }

  /* 2137 */
  #overlay.papal {
    display: block;
    background: radial-gradient(ellipse at center, rgba(255,215,0,0.35) 0%, rgba(180,120,0,0.15) 50%, transparent 75%);
    animation: holyGlow 2s ease-in-out infinite alternate;
  }
  @keyframes holyGlow {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  /* ===== ANIMATIONS ===== */
  @keyframes popUp   { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.5);opacity:1} 100%{transform:scale(1);opacity:0} }
  @keyframes bounce  { 0%,20%,50%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-30px)} 60%{transform:translateY(-15px)} }
  @keyframes fall    { 0%{transform:translateY(-10px) rotate(0deg)} 100%{transform:translateY(110vh) rotate(360deg)} }
  @keyframes floatUp { 0%{transform:translateY(110vh) rotate(0deg);opacity:0.9} 100%{transform:translateY(-20vh) rotate(20deg);opacity:0} }
  @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes shake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px) rotate(-5deg)} 40%{transform:translateX(10px) rotate(5deg)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
  @keyframes niceFlash { 0%,100%{color:#fff} 25%{color:#ff69b4} 75%{color:#ff1493} }
  @keyframes sixsevenZoom { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
  @keyframes papalRise { 0%{transform:translateY(60px) scale(0.8);opacity:0} 60%{transform:translateY(-10px) scale(1.05);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
  @keyframes holyRay  { 0%,100%{opacity:0} 50%{opacity:1} }

  .confetti, .emoji, .memeText, .essaText, .floatText {
    position: absolute;
    pointer-events: none;
    opacity: 0.9;
    z-index: 200;
  }

  /* ===== SPECIAL RESULT STYLES ===== */
  #result.sixseven  { animation: shake 0.3s ease 3, sixsevenZoom 0.5s ease 3; color: #ff3030; text-shadow: 0 0 30px #ff0000, 0 0 60px #ff6600; }
  #result.sixty9    { animation: bounce 0.8s, niceFlash 0.4s ease 5; color: #ff69b4; text-shadow: 0 0 20px #ff69b4; }
  #result.blaze420  { animation: bounce 1s ease; color: #00ff88; text-shadow: 0 0 20px #00cc44, 0 0 60px #005522; }
  #result.papal2137 { animation: papalRise 1.2s ease forwards; color: #ffd700; text-shadow: 0 0 30px #ffaa00, 0 0 80px #ff8800; font-size: 8vw !important; }

  /* body themes */
  body.theme-blaze   { background-color: #0a1a0a; }
  body.theme-papal   { background-color: #1a1000; }
  body.theme-sixseven{ background-color: #1a0000; }
  body.theme-sixty9  { background-color: #1a0012; }

  /* holy rays */
  .holyRay {
    position: fixed;
    top: 50%; left: 50%;
    width: 4px;
    height: 60vh;
    background: linear-gradient(to top, rgba(255,215,0,0.8), transparent);
    transform-origin: bottom center;
    animation: holyRay 1.5s ease-in-out infinite;
    z-index: 99;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="overlay"></div>
<div id="container">
  <div id="counter"></div>
  <div id="result"></div>
  <button id="drawBtn" onclick="losuj()">🎲 Losuj</button>
  <button id="resetBtn" onclick="resetuj()">🔄 Resetuj (wszyscy wylosowani!)</button>
</div>

<script>
const pracownicy = [
  "Paweł Przygodzki","Paweł Płuciennik","Jakub Ranowicz","Jakob Zawadzki",
  "Tomasz Dobrowolski","Bartolomeo Effenbus","Wojtek Pająk","Dawid Gil","Krzysztof Ściśński"
];

const emojiList   = ["😂","🤯","💀","🔥","🍆","🥵","🤌","💩","🤡","👀","💥","🙌","😎","🫣"];
const memeTextList= ["XD","ESSA","six-seven","😂","💀","🔥","POG","LMAO","🥵","🤌","YEET"];
const essaList    = ["ESSA","ESSA!","E💥SSA","ESSA XD","six-seven"];
const niceList    = ["😏","nice","👀","hehe","hihi","😈","🍑","( ͡° ͜ʖ ͡°)","sus","heh"];
const blazeList   = ["💨","🌿","🍃","420","BLAZE IT","snoop","🔥","✌️","chill bro","luzik"];
const papalList   = ["✝️","🙏","JPW2","Habemus Papam","Totus Tuus","Amen","JPII","karol","nie lękajcie się","👴✝️"];

let available = [...Array(pracownicy.length).keys()];
let holyRays  = [];

function rng(min,max){ return Math.random()*(max-min)+min; }
function rngInt(min,max){ return Math.floor(rng(min,max+1)); }

function updateCounter(){
  const c = document.getElementById("counter");
  c.textContent = `Pozostało: ${available.length} / ${pracownicy.length}`;
}

function adjustFontSize(element, forced){
  if(forced){ element.style.fontSize = forced; return; }
  let fontSize = 80;
  element.style.fontSize = fontSize + "px";
  while(element.scrollWidth < window.innerWidth*0.92 && element.scrollHeight < window.innerHeight*0.5){
    fontSize += 8;
    element.style.fontSize = fontSize+"px";
    if(fontSize>2000) break;
  }
  element.style.fontSize = Math.max(fontSize-8, 20)+"px";
}

function clearEffects(){
  document.body.className = "";
  const overlay = document.getElementById("overlay");
  overlay.className = "";
  overlay.style.display = "none";
  holyRays.forEach(r=>r.remove());
  holyRays = [];
}

// ─── STANDARD CONFETTI / EMOJIS ───────────────────────────────────────────
function spawnStandard(){
  for(let i=0;i<50;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.cssText=`left:${rng(0,window.innerWidth)}px;top:-10px;width:${rng(5,15)}px;height:${rng(5,15)}px;background:hsl(${rng(0,360)},100%,50%);border-radius:${Math.random()>0.5?'50%':'2px'};animation:fall ${rng(1,2.5)}s linear forwards;`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),2500);
  }
  for(let i=0;i<25;i++){
    const e=document.createElement("div"); e.className="emoji";
    e.textContent=emojiList[rngInt(0,emojiList.length-1)];
    e.style.cssText=`left:${rng(0,window.innerWidth)}px;top:-10px;font-size:${rng(20,50)}px;animation:fall ${rng(1,2.5)}s linear forwards;`;
    document.body.appendChild(e); setTimeout(()=>e.remove(),2500);
  }
  for(let i=0;i<20;i++){
    const m=document.createElement("div"); m.className="memeText";
    m.textContent=memeTextList[rngInt(0,memeTextList.length-1)];
    m.style.cssText=`left:${rng(0,window.innerWidth)}px;top:${rng(0,window.innerHeight)}px;font-size:${rng(15,50)}px;color:hsl(${rng(0,360)},100%,50%);animation:popUp 1.5s ease forwards;`;
    document.body.appendChild(m); setTimeout(()=>m.remove(),1500);
  }
  for(let i=0;i<10;i++){
    const s=document.createElement("div"); s.className="essaText";
    s.textContent=essaList[rngInt(0,essaList.length-1)];
    s.style.cssText=`left:${rng(0,window.innerWidth)}px;top:${rng(0,window.innerHeight)}px;font-size:${rng(30,80)}px;color:hsl(${rng(0,360)},100%,50%);animation:popUp 1.5s ease forwards;`;
    document.body.appendChild(s); setTimeout(()=>s.remove(),1500);
  }
}

// ─── SIX SEVEN ────────────────────────────────────────────────────────────
function effectSixSeven(){
  document.body.classList.add("theme-sixseven");
  const overlay=document.getElementById("overlay");
  overlay.className="sixseven"; overlay.style.display="block";
  setTimeout(()=>{ overlay.className=""; overlay.style.display="none"; },2000);

  for(let i=0;i<40;i++){
    const t=document.createElement("div"); t.className="memeText";
    t.textContent=["six-seven","67","SIX SEVEN","6️⃣7️⃣","ESSA SIX","😤","🔥"][rngInt(0,6)];
    t.style.cssText=`left:${rng(0,window.innerWidth)}px;top:${rng(0,window.innerHeight)}px;font-size:${rng(20,70)}px;color:hsl(${rng(0,30)},100%,60%);font-family:'Black Han Sans',sans-serif;font-weight:900;animation:popUp ${rng(0.8,1.8)}s ease forwards;`;
    document.body.appendChild(t); setTimeout(()=>t.remove(),2000);
  }

  // Confetti w barwach czerwono-pomarańczowych
  for(let i=0;i<60;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.cssText=`left:${rng(0,window.innerWidth)}px;top:-10px;width:${rng(8,18)}px;height:${rng(8,18)}px;background:hsl(${rng(0,40)},100%,55%);border-radius:2px;animation:fall ${rng(1,3)}s linear forwards;`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),3000);
  }

  setTimeout(()=>{ document.body.classList.remove("theme-sixseven"); }, 3000);
}

// ─── 69 ───────────────────────────────────────────────────────────────────
function effectSixtyNine(){
  document.body.classList.add("theme-sixty9");
  const overlay=document.getElementById("overlay");
  overlay.className="sixty9"; overlay.style.display="block";
  setTimeout(()=>{ overlay.className=""; overlay.style.display="none"; },3000);

  for(let i=0;i<50;i++){
    const t=document.createElement("div"); t.className="memeText";
    t.textContent=niceList[rngInt(0,niceList.length-1)];
    t.style.cssText=`left:${rng(0,window.innerWidth)}px;top:${rng(0,window.innerHeight)}px;font-size:${rng(18,65)}px;color:hsl(${rng(300,360)},100%,70%);animation:popUp ${rng(0.8,2)}s ease forwards;`;
    document.body.appendChild(t); setTimeout(()=>t.remove(),2200);
  }

  for(let i=0;i<50;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.cssText=`left:${rng(0,window.innerWidth)}px;top:-10px;width:${rng(6,16)}px;height:${rng(6,16)}px;background:hsl(${rng(300,360)},100%,70%);border-radius:50%;animation:fall ${rng(1,2.5)}s linear forwards;`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),3000);
  }

  setTimeout(()=>{ document.body.classList.remove("theme-sixty9"); }, 3000);
}

// ─── 420 ──────────────────────────────────────────────────────────────────
function effectBlaze(){
  document.body.classList.add("theme-blaze");
  const overlay=document.getElementById("overlay");
  overlay.className="blaze"; overlay.style.display="block";
  setTimeout(()=>{ overlay.className=""; overlay.style.display="none"; },5000);

  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const t=document.createElement("div"); t.className="floatText";
      t.textContent=blazeList[rngInt(0,blazeList.length-1)];
      t.style.cssText=`left:${rng(0,window.innerWidth)}px;bottom:-10px;font-size:${rng(20,70)}px;color:hsl(${rng(100,150)},100%,55%);animation:floatUp ${rng(2,5)}s ease-out forwards;`;
      document.body.appendChild(t); setTimeout(()=>t.remove(),6000);
    }, i*60);
  }

  // Zielone konfetti
  for(let i=0;i<40;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.cssText=`left:${rng(0,window.innerWidth)}px;top:-10px;width:${rng(6,14)}px;height:${rng(6,14)}px;background:hsl(${rng(100,140)},80%,45%);border-radius:50%;animation:fall ${rng(2,4)}s linear forwards;`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),5000);
  }

  setTimeout(()=>{ document.body.classList.remove("theme-blaze"); }, 6000);
}

// ─── 2137 — PAPIEŻ ────────────────────────────────────────────────────────
function effectPapal(){
  document.body.classList.add("theme-papal");
  const overlay=document.getElementById("overlay");
  overlay.className="papal"; overlay.style.display="block";

  // Promienie świętości
  for(let i=0;i<12;i++){
    const ray=document.createElement("div"); ray.className="holyRay";
    ray.style.cssText=`transform:rotate(${i*30}deg) translateX(-50%);animation-delay:${i*0.1}s;`;
    document.body.appendChild(ray); holyRays.push(ray);
  }

  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const t=document.createElement("div"); t.className="floatText";
      t.textContent=papalList[rngInt(0,papalList.length-1)];
      t.style.cssText=`left:${rng(0,window.innerWidth)}px;bottom:-10px;font-size:${rng(18,60)}px;color:hsl(${rng(40,55)},100%,${rng(55,80)}%);font-family:'Black Han Sans',sans-serif;animation:floatUp ${rng(2,5)}s ease-out forwards;`;
      document.body.appendChild(t); setTimeout(()=>t.remove(),6000);
    }, i*60);
  }

  // Złote konfetti
  for(let i=0;i<80;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.cssText=`left:${rng(0,window.innerWidth)}px;top:-10px;width:${rng(5,15)}px;height:${rng(3,8)}px;background:hsl(${rng(40,55)},100%,55%);border-radius:2px;animation:fall ${rng(2,5)}s linear forwards;`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),6000);
  }

  setTimeout(()=>{
    overlay.className=""; overlay.style.display="none";
    holyRays.forEach(r=>r.remove()); holyRays=[];
    document.body.classList.remove("theme-papal");
  }, 7000);
}

// ─── GŁÓWNA FUNKCJA ───────────────────────────────────────────────────────
function losuj(){
  if(available.length===0) return;

  clearEffects();

  const rIdx=rngInt(0,available.length-1);
  const idx=available[rIdx];
  available.splice(rIdx,1);

  // Specjalne wartości: 2137 (1.5%), 420 (1%)
  const magic=Math.random();
  let percent;
  if(magic < 0.015){
    percent = 2137;
  } else if(magic < 0.025){
    percent = 420;
  } else {
    percent = rngInt(0,100);
  }

  const result=document.getElementById("result");
  result.className="";

  let label = `${pracownicy[idx]}`;
  let sublabel = `— ${percent}%`;

  if(percent===2137){
    result.innerHTML = `✝️ Jan Paweł II ✝️<br><span style="font-size:0.55em;color:#ffd700">— 2137%</span><br><span style="font-size:0.35em;color:#ffaa00">${pracownicy[idx]}</span>`;
    result.classList.add("papal2137");
    setTimeout(()=>effectPapal(),300);
  } else if(percent===420){
    result.innerHTML = `${pracownicy[idx]}<br><span style="font-size:0.7em;color:#00ff88">— 420% 💨</span>`;
    result.classList.add("blaze420");
    setTimeout(()=>effectBlaze(),200);
  } else if(percent===69){
    result.innerHTML = `${pracownicy[idx]}<br><span style="font-size:0.7em">— 69% 😏</span>`;
    result.classList.add("sixty9");
    setTimeout(()=>effectSixtyNine(),200);
    spawnStandard();
  } else if(percent===67){
    result.innerHTML = `${pracownicy[idx]}<br><span style="font-size:0.7em">— 67% 🔥 <em>six-seven</em></span>`;
    result.classList.add("sixseven");
    setTimeout(()=>effectSixSeven(),200);
    spawnStandard();
  } else {
    result.innerHTML = `${label}<br><span style="font-size:0.75em;opacity:0.85">${sublabel}</span>`;
    result.style.animation="bounce 0.8s";
    spawnStandard();
  }

  adjustFontSize(result);

  const btn=document.getElementById("drawBtn");
  btn.style.transform="rotate(-10deg)";
  setTimeout(()=>btn.style.transform="rotate(0deg)",200);

  updateCounter();

  if(available.length===0){
    document.getElementById("drawBtn").disabled=true;
    document.getElementById("resetBtn").style.display="block";
  }
}

function resetuj(){
  available=[...Array(pracownicy.length).keys()];
  document.getElementById("drawBtn").disabled=false;
  document.getElementById("resetBtn").style.display="none";
  document.getElementById("result").textContent="";
  document.getElementById("result").className="";
  clearEffects();
  updateCounter();
}

// Inicjalizacja
updateCounter();

window.addEventListener("resize",()=>{
  const result=document.getElementById("result");
  if(result.textContent) adjustFontSize(result);
});
</script>
</body>
</html>
